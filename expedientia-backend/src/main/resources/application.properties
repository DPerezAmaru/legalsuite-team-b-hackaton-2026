# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de datos ─────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expedientia}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expedientia}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:expedientia}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Spring AI - Google Gemini ─────────────────────────────────────────────────
spring.ai.google.genai.api-key=${GEMINI_API_KEY}

# ── Subida de archivos (PDF) ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
