# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de datos ─────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expedientia}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expedientia}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:expedientia}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# ── Spring AI - Google Gemini ─────────────────────────────────────────────────
spring.ai.google.genai.api-key=${GEMINI_API_KEY}

# ── Subida de archivos (PDF) ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ── Spring AI - Opciones del modelo ──────────────────────────────────────────
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
spring.ai.google.genai.chat.options.temperature=0.1
spring.ai.google.genai.chat.options.max-output-tokens=16384

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
